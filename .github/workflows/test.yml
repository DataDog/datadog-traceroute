  # SSH Debug Job - E2E Localhost CLI Tests with SSH Access
  # This job allows you to SSH into the GitHub runner for debugging purposes.
  #
  # To manually trigger this job:
  # 1. Go to GitHub.com and navigate to this repository
  # 2. Click the "Actions" tab at the top
  # 3. Select the "test" workflow in the left sidebar
  # 4. Click the blue "Run workflow" button on the right side
  # 5. Select the branch you want to run on
  # 6. Click "Run workflow" to start
  #
  # Once the workflow is running:
  # 1. Click on the running workflow to see the jobs
  # 2. Click on the "E2E Localhost CLI Tests (SSH Debug)" job for your OS
  # 3. Wait for the "Setup upterm session" step to start
  # 4. Look for the SSH connection details in the step logs:
  #    - SSH command to connect (e.g., ssh <session-id>::<host>)
  #    - Web shell URL for browser-based access
  # 5. Use the provided SSH command or web URL to connect to the runner
  # 6. The session will remain active for 30 minutes or until you cancel the job
  # 7. You can interact with the runner, run commands, debug tests, etc.
  #
  # Note: This job only runs on workflow_dispatch (manual trigger).
  # Only the person who triggered the workflow can access the SSH session.
  #
  e2e_ssh_debug_for_manual_tests:
    name: "E2E SSH Debug for Manual Tests"
    runs-on: ${{ matrix.os }}
    # Only run this job manually to avoid accidental SSH sessions
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        #JMW does it work for windows?
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      SUDO_CMD: ${{ matrix.os != 'windows-latest' && 'sudo' || '' }}
      BUILD_TARGET: ${{ matrix.os == 'windows-latest' && 'datadog-traceroute.exe' || 'datadog-traceroute' }}
      EXECUTABLE: ${{ matrix.os == 'windows-latest' && './datadog-traceroute.exe' || './datadog-traceroute' }}
      SERVER_BUILD_TARGET: ${{ matrix.os == 'windows-latest' && 'datadog-traceroute-server.exe' || 'datadog-traceroute-server' }}
      SERVER_EXECUTABLE: ${{ matrix.os == 'windows-latest' && './datadog-traceroute-server.exe' || './datadog-traceroute-server' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"
      - run: go mod tidy

      # Build the CLI binary
      - name: Build CLI
        run: |
          go build -o $BUILD_TARGET .
          echo "Built CLI executable: $EXECUTABLE"
          echo "Test with: $SUDO_CMD $EXECUTABLE --proto tcp --tcp-method prefer_sack --traceroute-queries 3 --e2e-queries 10"

      # Build the HTTP server binary
      - name: Build HTTP Server
        run: go build -o $SERVER_BUILD_TARGET ./cmd/traceroute-server

      # Run the HTTP server in the background
      - name: Run HTTP Server
        run: |
          $SUDO_CMD $SERVER_EXECUTABLE &
          sleep 2
          echo "HTTP server started on default port 3765"
          echo "Test with: curl http://localhost:3765/traceroute?target=127.0.0.1&protocol=icmp"

      # Setup upterm session for SSH access
      # This will print SSH connection details in the job logs
      - name: Setup upterm session
        if: always()
        uses: lhotari/action-upterm@v1
        timeout-minutes: 30
        with:
          limit-access-to-actor: true
