name: test

on:
  push:
    branches:
      - "main"
      - "mq-working-branch-*"
    tags:
      - "v*"
  pull_request:

jobs:
  unit_tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v2
        with:
          go-version: 1.24.6
      - run: go mod tidy
      - run: go test -tags=test -v ./...

  basic_functionality_tests:
    name: "Basic CLI Tests"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      SUDO_CMD: ${{ matrix.os != 'windows-latest' && 'sudo' || '' }}
      BUILD_TARGET: ${{ matrix.os == 'windows-latest' && 'datadog-traceroute.exe' || 'datadog-traceroute' }}
      EXECUTABLE: ${{ matrix.os == 'windows-latest' && './datadog-traceroute.exe' || './datadog-traceroute' }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v2
        with:
          go-version: 1.24.6
      - run: go mod tidy

      # Build the CLI binary
      - name: Build CLI
        run: go build -o $BUILD_TARGET .

      # Test CLI help and version commands (safe on all platforms)
      - name: Test CLI help
        run: $EXECUTABLE --help

      - name: Test CLI version
        run: $EXECUTABLE version

      # Test invalid arguments (should fail gracefully)
      - name: Test invalid protocol
        run: |
          if $EXECUTABLE --proto invalid 127.0.0.1; then
            echo "ERROR: Should have failed with invalid protocol"
            exit 1
          else
            echo "SUCCESS: Correctly rejected invalid protocol"
          fi

      # Platform-specific tests
      - name: Test Windows driver flag (Windows only)
        if: matrix.os == 'windows-latest'
        run: $EXECUTABLE --windows-driver --help
        continue-on-error: true

  localhost_tests:
    name: "Localhost Network Tests"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      SUDO_CMD: ${{ matrix.os != 'windows-latest' && 'sudo' || '' }}
      BUILD_TARGET: ${{ matrix.os == 'windows-latest' && 'datadog-traceroute.exe' || 'datadog-traceroute' }}
      EXECUTABLE: ${{ matrix.os == 'windows-latest' && './datadog-traceroute.exe' || './datadog-traceroute' }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v2
        with:
          go-version: 1.24.6
      - run: go mod tidy

      # Build the CLI binary
      - name: Build CLI
        run: go build -o $BUILD_TARGET .

      # Test different protocols against localhost
      - name: Test ICMP traceroute to localhost
        run: $SUDO_CMD $EXECUTABLE --proto icmp --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 127.0.0.1

      - name: Test UDP traceroute to localhost
        run: $SUDO_CMD $EXECUTABLE --proto udp --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 127.0.0.1

      - name: Test TCP traceroute to localhost
        run: $SUDO_CMD $EXECUTABLE --proto tcp --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 127.0.0.1

  fake_network_tests:
    name: "Fake Network Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      SUDO_CMD: sudo
      BUILD_TARGET: datadog-traceroute
      EXECUTABLE: ./datadog-traceroute
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v2
        with:
          go-version: 1.24.6
      - run: go mod tidy

      # Build the CLI binary
      - name: Build CLI
        run: go build -o $BUILD_TARGET .

      # Setup fake network environment
      - name: Setup fake network
        run: sudo bash testutils/router_setup.sh

      # Test different protocols against fake network
      - name: Test ICMP traceroute to fake network
        run: $SUDO_CMD $EXECUTABLE --proto icmp --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 198.51.100.2

      - name: Test UDP traceroute to fake network
        run: $SUDO_CMD $EXECUTABLE --proto udp --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 198.51.100.2

      - name: Test TCP traceroute to fake network
        run: $SUDO_CMD $EXECUTABLE --proto tcp --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 198.51.100.2

      - name: Test TCP sack traceroute to fake network
        run: $SUDO_CMD $EXECUTABLE --proto tcp --tcp-method sack --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 198.51.100.2

      - name: Test TCP prefer_sack traceroute to fake network
        run: $SUDO_CMD $EXECUTABLE --proto tcp --tcp-method prefer_sack --max-ttl 5 --traceroute-queries 3 --e2e-queries 10 --timeout 500 198.51.100.2

  public_endpoint_tests:
    name: "Public Endpoint Tests"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      SUDO_CMD: ${{ matrix.os != 'windows-latest' && 'sudo' || '' }}
      BUILD_TARGET: ${{ matrix.os == 'windows-latest' && 'datadog-traceroute.exe' || 'datadog-traceroute' }}
      EXECUTABLE: ${{ matrix.os == 'windows-latest' && './datadog-traceroute.exe' || './datadog-traceroute' }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v2
        with:
          go-version: 1.24.6
      - run: go mod tidy

      # Build the CLI binary
      - name: Build CLI
        run: go build -o $BUILD_TARGET .

      # Test different protocols against reliable public endpoints
      - name: Test TCP traceroute to GitHub
        run: $SUDO_CMD $EXECUTABLE --proto tcp --port 443 --traceroute-queries 3 --e2e-queries 10 --timeout 1000 github.com

      - name: Test TCP sack traceroute to GitHub
        run: $SUDO_CMD $EXECUTABLE --proto tcp --tcp-method sack --port 443 --traceroute-queries 3 --e2e-queries 10 --timeout 1000 github.com

      - name: Test TCP prefer_sack traceroute to GitHub
        run: $SUDO_CMD $EXECUTABLE --proto tcp --tcp-method prefer_sack --port 443 --traceroute-queries 3 --e2e-queries 10 --timeout 1000 github.com

